<!doctype html>
<html lang="en">
  <head>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link href="/ohif/epicurrents.bundle.css" rel="stylesheet">
    <meta charset="UTF-8" />
    <meta name="theme-color" content="#ffffff">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EpiCurrents</title>
    <style data-epicurrents-styles>
      html, body {
          margin: 0;
          padding: 0;
          width: 100%;
          height: 100%;
      }
      #epicurrents-placeholder {
          padding: 5rem;
          opacity: 0.5;
          font-size: 4em;
          text-align: center;
          font-variant: small-caps;
          font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }
      #epicurrents-error {
          display: block;
          padding: 5rem;
          font-size: 4em;
          text-align: center;
          font-variant: small-caps;
          font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }
      #noscript {
        display: flex;
        position: absolute;
        inset: 0;
        align-items: center;
        justify-content: center;
        line-height: 1.5em;
        text-align: center;
        font-size: min(2.5vw, 7.5vh);
        color: darkred;
      }
    </style>
  </head>
  <body>
    <div id="epicurrents"></div>
    <noscript id="noscript">
        This application requires JavaScript.<br />
        Please enable JavaScript in your browser settings.
    </noscript>
    <script>
      window.PUBLIC_URL = '/ohif/'
      // Production mode, the log threshold (?log), the Pyodide service (?services/?advanced) and
      // the SAB cache size (?memory) are resolved in the framework setup so every consumer honours
      // them identically. Only build-entry-specific values are set here.
      const urlParams = new URLSearchParams(window.location.search)
      window.__EPICURRENTS__ = {
        SETUP: {
          /**
           * List of modules to load on application start (test/demo convenience).
           */
          activeModules: urlParams.get('mods')?.split(',') || [],
          /**
           * Path to the assets folder.
           */
          assetPath: window.location.href,
        }
      }
    </script>
    <script type="module" src="/src/standalone.ts"></script>
  </body>
</html>
